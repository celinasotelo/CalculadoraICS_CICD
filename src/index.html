<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora ICS</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #d0f0f7 0%, #d4f5e2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(100, 180, 200, 0.18);
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header .icon {
      font-size: 2.4rem;
      display: block;
      margin-bottom: 10px;
    }

    .card-header h1 {
      font-size: 1.5rem;
      color: #2a7a8c;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .card-header p {
      font-size: 0.85rem;
      color: #7ab5c0;
      margin-top: 4px;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 28px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #4a9aaa;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input[type="number"] {
      border: 2px solid #b8e8f0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 1rem;
      color: #2a4a50;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #f5fdff;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    input[type="number"]:focus {
      border-color: #5bbfd4;
      box-shadow: 0 0 0 3px rgba(91, 191, 212, 0.15);
      background: #fff;
    }

    input[type="number"].error {
      border-color: #f4a0a0;
      background: #fff5f5;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #5bbfd4 0%, #6dd4a0 100%);
      color: white;
      letter-spacing: 0.3px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 14px rgba(91, 191, 212, 0.35);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(91, 191, 212, 0.45);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(91, 191, 212, 0.25);
    }

    .result {
      margin-top: 28px;
      border-radius: 16px;
      padding: 22px 20px;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .result.aprobado {
      background: linear-gradient(135deg, #e8f9f0 0%, #d4f5e2 100%);
      border: 2px solid #a3e6c2;
    }

    .result.desaprobado {
      background: linear-gradient(135deg, #fff0f0 0%, #fde8e8 100%);
      border: 2px solid #f4bcbc;
    }

    .result .status-icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 8px;
    }

    .result .promedio-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #7aaa90;
      margin-bottom: 2px;
    }

    .result.desaprobado .promedio-label {
      color: #c08080;
    }

    .result .promedio-valor {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
    }

    .result.aprobado .promedio-valor {
      color: #2e9e6a;
    }

    .result.desaprobado .promedio-valor {
      color: #d05050;
    }

    .result .status-text {
      font-size: 1.05rem;
      font-weight: 700;
      padding: 6px 18px;
      border-radius: 20px;
      display: inline-block;
    }

    .result.aprobado .status-text {
      background: #c4f0d8;
      color: #1e7a4e;
    }

    .result.desaprobado .status-text {
      background: #fad0d0;
      color: #b03030;
    }

    .error-msg {
      margin-top: 16px;
      background: #fff2f2;
      border: 1.5px solid #f4bcbc;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.88rem;
      color: #c04040;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .btn-reset {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      border: 2px solid #b8e8f0;
      border-radius: 12px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #4a9aaa;
      transition: background 0.15s, color 0.15s;
      display: none;
    }

    .btn-reset:hover {
      background: #eaf7fb;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <span class="icon">📐</span>
      <h1>Calculadora ICS</h1>
      <p>Ingresá tus tres notas de parcial (0 – 10)</p>
    </div>

    <div class="fields">
      <div class="field">
        <label for="p1">Parcial 1</label>
        <input type="number" id="p1" placeholder="Ej: 7" min="0" max="10" step="0.1" />
      </div>
      <div class="field">
        <label for="p2">Parcial 2</label>
        <input type="number" id="p2" placeholder="Ej: 8" min="0" max="10" step="0.1" />
      </div>
      <div class="field">
        <label for="p3">Parcial 3</label>
        <input type="number" id="p3" placeholder="Ej: 9" min="0" max="10" step="0.1" />
      </div>
    </div>

    <button class="btn" onclick="calcular()">Calcular promedio</button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result" id="result">
      <span class="status-icon" id="statusIcon"></span>
      <div class="promedio-label">Promedio final</div>
      <div class="promedio-valor" id="promedioValor"></div>
      <span class="status-text" id="statusText"></span>
    </div>

    <button class="btn-reset" id="btnReset" onclick="resetear()">Limpiar</button>
  </div>

  <script>
    function calcularPromedio(p1, p2, p3) {
      const notas = [p1, p2, p3];

      if (!notas.every(n => typeof n === 'number' && !Number.isNaN(n))) {
        throw new Error('Las notas deben ser números');
      }
      if (!notas.every(n => n >= 0 && n <= 10)) {
        throw new Error('Las notas deben estar entre 0 y 10');
      }

      const promedio = Math.round((p1 + p2 + p3) / 3);
      const aprobado = notas.every(n => n >= 6);
      return { promedio, aprobado };
    }

    function calcular() {
      const inputs = ['p1', 'p2', 'p3'];
      const errorEl = document.getElementById('errorMsg');
      const resultEl = document.getElementById('result');
      const btnReset = document.getElementById('btnReset');

      errorEl.style.display = 'none';
      resultEl.style.display = 'none';
      btnReset.style.display = 'none';
      inputs.forEach(id => document.getElementById(id).classList.remove('error'));

      const values = inputs.map(id => {
        const val = document.getElementById(id).value.trim();
        return val === '' ? NaN : parseFloat(val);
      });

      try {
        const { promedio, aprobado } = calcularPromedio(...values);

        resultEl.className = 'result ' + (aprobado ? 'aprobado' : 'desaprobado');
        document.getElementById('statusIcon').textContent = aprobado ? '🎉' : '😔';
        document.getElementById('promedioValor').textContent = promedio;
        document.getElementById('statusText').textContent = aprobado ? 'Aprobado' : 'Desaprobado';

        resultEl.style.display = 'block';
        btnReset.style.display = 'block';
      } catch (e) {
        values.forEach((v, i) => {
          if (Number.isNaN(v) || v < 0 || v > 10) {
            document.getElementById(inputs[i]).classList.add('error');
          }
        });
        errorEl.textContent = e.message;
        errorEl.style.display = 'block';
        btnReset.style.display = 'block';
      }
    }

    function resetear() {
      ['p1', 'p2', 'p3'].forEach(id => {
        const el = document.getElementById(id);
        el.value = '';
        el.classList.remove('error');
      });
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('result').style.display = 'none';
      document.getElementById('btnReset').style.display = 'none';
      document.getElementById('p1').focus();
    }

    document.querySelectorAll('input[type="number"]').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') calcular();
      });
    });
  </script>
</body>
</html>
