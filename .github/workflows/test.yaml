name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint ESLint
        run: npm run lint

      - name: Test unitarios
        run: npm test

      - name: Build Docker
        run: docker build -t calculadora-ics .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Deploy to Render
        run: curl -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  e2e:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

  notify-discord:
    runs-on: ubuntu-latest
    needs: [build, deploy, e2e]
    if: always()

    steps:
      - name: Determinar resultado del pipeline
        id: pipeline-status
        run: |
          BUILD_RESULT="${{ needs.build.result }}"
          DEPLOY_RESULT="${{ needs.deploy.result }}"
          E2E_RESULT="${{ needs.e2e.result }}"

          if [ "$BUILD_RESULT" = "failure" ]; then
            FAILED_JOBS="$FAILED_JOBS build"
          fi
          if [ "$DEPLOY_RESULT" = "failure" ]; then
            FAILED_JOBS="$FAILED_JOBS deploy"
          fi
          if [ "$E2E_RESULT" = "failure" ]; then
            FAILED_JOBS="$FAILED_JOBS e2e"
          fi

          if [ -z "$FAILED_JOBS" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "failed_jobs=" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "failed_jobs=$FAILED_JOBS" >> $GITHUB_OUTPUT
          fi

      - name: Notificar éxito a Discord
        if: steps.pipeline-status.outputs.status == 'success'
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Pipeline exitoso",
                "description": "Todos los jobs del pipeline finalizaron correctamente.",
                "color": 3066993,
                "fields": [
                  {
                    "name": "📦 Repositorio",
                    "value": "[${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})",
                    "inline": true
                  },
                  {
                    "name": "🌿 Rama",
                    "value": "`${{ github.ref_name }}`",
                    "inline": true
                  },
                  {
                    "name": "👤 Autor",
                    "value": "`${{ github.actor }}`",
                    "inline": true
                  },
                  {
                    "name": "💬 Commit",
                    "value": "[`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})",
                    "inline": false
                  },
                  {
                    "name": "🔗 Ver pipeline",
                    "value": "[${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                    "inline": false
                  }
                ],
                "footer": {
                  "text": "GitHub Actions • ${{ github.workflow }}"
                },
                "timestamp": "${{ github.event.head_commit.timestamp }}"
              }]
            }'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notificar fallo a Discord
        if: steps.pipeline-status.outputs.status == 'failure'
        run: |
          FAILED="${{ steps.pipeline-status.outputs.failed_jobs }}"
          # Construir lista de jobs fallidos con emoji
          JOBS_TEXT=""
          for job in $FAILED; do
            JOBS_TEXT="$JOBS_TEXT❌ \`$job\`\n"
          done

          curl -s -o /dev/null -w "%{http_code}" -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚨 Pipeline con errores\",
                \"description\": \"Uno o más jobs fallaron. Revisá los detalles a continuación.\",
                \"color\": 15158332,
                \"fields\": [
                  {
                    \"name\": \"📦 Repositorio\",
                    \"value\": \"[${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"🌿 Rama\",
                    \"value\": \"\`${{ github.ref_name }}\`\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"👤 Autor\",
                    \"value\": \"\`${{ github.actor }}\`\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"💬 Commit\",
                    \"value\": \"[\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"❌ Jobs fallidos\",
                    \"value\": \"$(echo -e "$JOBS_TEXT")\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"🔗 Ver logs del pipeline\",
                    \"value\": \"[${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
                    \"inline\": false
                  }
                ],
                \"footer\": {
                  \"text\": \"GitHub Actions • ${{ github.workflow }}\"
                },
                \"timestamp\": \"${{ github.event.head_commit.timestamp }}\"
              }]
            }"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}