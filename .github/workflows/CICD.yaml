name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      failed_step: ${{ steps.check.outputs.failed_step }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Lint ESLint
        id: lint
        run: npm run lint

      - name: Test unitarios
        id: unit-test
        run: npm test

      - name: Build Docker
        id: docker
        run: docker build -t calculadora-ics .

      - name: Detectar paso fallido
        id: check
        if: failure()
        run: |
          if [ "${{ steps.install.outcome }}" = "failure" ]; then
            echo "failed_step=Install dependencies" >> $GITHUB_OUTPUT
          elif [ "${{ steps.lint.outcome }}" = "failure" ]; then
            echo "failed_step=Lint ESLint" >> $GITHUB_OUTPUT
          elif [ "${{ steps.unit-test.outcome }}" = "failure" ]; then
            echo "failed_step=Test unitarios" >> $GITHUB_OUTPUT
          elif [ "${{ steps.docker.outcome }}" = "failure" ]; then
            echo "failed_step=Build Docker" >> $GITHUB_OUTPUT
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Deploy to Render
        run: curl -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  e2e:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

  notify-discord:
    runs-on: ubuntu-latest
    needs: [build, deploy, e2e]
    if: always()

    steps:
      - name: Notificar a Discord
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          BUILD="${{ needs.build.result }}"
          DEPLOY="${{ needs.deploy.result }}"
          E2E="${{ needs.e2e.result }}"

          # Armar lista de jobs completados exitosamente
          COMPLETED=""
          [ "$BUILD" = "success" ] && COMPLETED="build"
          [ "$DEPLOY" = "success" ] && COMPLETED="${COMPLETED:+$COMPLETED, }deploy"
          [ "$E2E" = "success" ] && COMPLETED="${COMPLETED:+$COMPLETED, }e2e"
          [ -z "$COMPLETED" ] && COMPLETED="ninguno"

          if [ "$BUILD" = "failure" ]; then
            COLOR=15158332
            TITLE="Pipeline fallido"
            FAILED_FIELD=",{\"name\":\"Job fallido\",\"value\":\"build\",\"inline\":true},{\"name\":\"Paso\",\"value\":\"${{ needs.build.outputs.failed_step }}\",\"inline\":true}"
          elif [ "$DEPLOY" = "failure" ]; then
            COLOR=15158332
            TITLE="Pipeline fallido"
            FAILED_FIELD=",{\"name\":\"Job fallido\",\"value\":\"deploy\",\"inline\":true}"
          elif [ "$E2E" = "failure" ]; then
            COLOR=15158332
            TITLE="Pipeline fallido"
            FAILED_FIELD=",{\"name\":\"Job fallido\",\"value\":\"e2e\",\"inline\":true},{\"name\":\"Paso\",\"value\":\"Run Playwright tests\",\"inline\":true}"
          else
            COLOR=3066993
            TITLE="Pipeline exitoso"
            FAILED_FIELD=""
          fi

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{
              \"title\":\"$TITLE\",
              \"color\":$COLOR,
              \"fields\":[
                {\"name\":\"Repositorio\",\"value\":\"${{ github.repository }}\",\"inline\":true},
                {\"name\":\"Rama\",\"value\":\"${{ github.head_ref || github.ref_name }}\",\"inline\":true},
                {\"name\":\"Autor\",\"value\":\"${{ github.actor }}\",\"inline\":true},
                {\"name\":\"Commit\",\"value\":\"[$SHORT_SHA]($COMMIT_URL)\",\"inline\":true},
                {\"name\":\"Jobs completados\",\"value\":\"$COMPLETED\",\"inline\":false}
                $FAILED_FIELD
              ],
              \"footer\":{\"text\":\"Ver pipeline: $RUN_URL\"}
            }]}"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}